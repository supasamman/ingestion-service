framework:
    messenger:
        transports:
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    exchange:
                        name: logs.ingest
                        type: direct
                        default_publish_routing_key: logs.ingest
                    queues:
                        logs.ingest:
                            binding_keys: [logs.ingest]
                            arguments:
                                x-max-priority: 10
        routing:
            App\Message\LogBatchMessage: async
